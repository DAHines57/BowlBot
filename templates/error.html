<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error</title>
  <style>
    :root { --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94); --dur: 0.2s; }
    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
    }
    body {
      font-family: system-ui, sans-serif;
      background: #12101a;
      color: #e8e6ef;
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }
    .shell {
      max-width: min(28rem, 100%);
      margin: 0 auto;
      animation: in 0.35s var(--ease) both;
    }
    @keyframes in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    h1 { color: #ff6b81; font-size: 1.15rem; margin: 0 0 0.75rem; }
    p { margin: 0 0 1rem; line-height: 1.55; }
    a {
      color: #50fa7b;
      text-decoration: none;
      font-weight: 600;
      padding: 0.35rem 0.5rem;
      margin: -0.35rem -0.5rem;
      border-radius: 6px;
      display: inline-block;
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease), transform 0.15s var(--ease);
    }
    a:hover { background: rgba(80, 250, 123, 0.12); color: #7bffc9; }
    a:active { transform: scale(0.97); }
    @media (min-width: 900px) {
      .shell { max-width: 36rem; }
      body { padding: 3rem 2rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Something went wrong</h1>
    <p>{{ message }}</p>
    <p><a href="/" class="embed-home-link">← Home</a></p>
  </div>
  <script>
  (function () {
    if (window.self === window.top) return;
    function goHome(e) {
      if (e) e.preventDefault();
      parent.postMessage({ type: "bowlbot-embed-home" }, window.location.origin);
    }
    document.querySelectorAll('a[href="/"], a.embed-home-link').forEach(function (a) {
      a.addEventListener("click", goHome);
    });
  })();
  </script>
</body>
</html>
